<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self'" />
  <title>RemindUP</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="card">
    <form id="reminder-form">
      <div class="field">
        <label for="text">Recordatorio</label>
        <textarea id="text" name="text" placeholder="Ej. Llamar al proveedor" required></textarea>
      </div>

      <div class="field">
        <label for="datetime">Notificar el</label>
        <input type="datetime-local" id="datetime" name="datetime" required />
      </div>

      <p class="status" id="status"></p>

      <div class="actions">
        <button type="button" id="cancel-btn" class="btn btn-plain">Cancelar</button>
        <button type="submit" id="save-btn" class="btn btn-accent">Guardar</button>
      </div>
    </form>

    <p class="credit">Hecho por Alejandro Villarreal Carvajal</p>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
