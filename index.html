<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'" />
  <title>RemindUP</title>
  <style>
    :root {
      --bg: #1a1b1e;
      --surface: #242529;
      --surface-alt: #2c2d32;
      --border: #38393f;
      --text: #f2f2f3;
      --text-muted: #9a9ba1;
      --accent: #6c5ce7;
      --accent-hover: #7d6ff2;
      --success: #2ecc71;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
    }

    h1 {
      font-size: 20px;
      margin: 0 0 4px;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 13px;
      margin: 0 0 24px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text-muted);
    }

    .field {
      margin-bottom: 18px;
    }

    input[type='text'],
    textarea,
    input[type='datetime-local'] {
      width: 100%;
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s ease;
    }

    textarea {
      resize: vertical;
      min-height: 70px;
    }

    input:focus,
    textarea:focus {
      border-color: var(--accent);
    }

    input[type='datetime-local']::-webkit-calendar-picker-indicator {
      filter: invert(1);
      cursor: pointer;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    button:hover {
      background: var(--accent-hover);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status {
      margin-top: 14px;
      font-size: 13px;
      text-align: center;
      min-height: 18px;
      color: var(--success);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Nuevo recordatorio</h1>
    <p class="subtitle">Se te notificará en la fecha y hora indicadas.</p>

    <form id="reminder-form">
      <div class="field">
        <label for="text">Texto del recordatorio</label>
        <textarea id="text" name="text" placeholder="Ej. Llamar al proveedor" required></textarea>
      </div>

      <div class="field">
        <label for="datetime">Fecha y hora de la notificación</label>
        <input type="datetime-local" id="datetime" name="datetime" required />
      </div>

      <button type="submit" id="save-btn">Guardar recordatorio</button>
      <p class="status" id="status"></p>
    </form>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
